<script>
// ================================================================
// ⚡ CONFIGURACIÓN — PEGAR AQUÍ TU URL DE GOOGLE SHEETS CSV
// ================================================================
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSi5A5lWi80zBoANmc2MGr7Zmh9BvpEabVVaKmdM_E9brjCq1Cdc9a46AXGzxHohSG2st6hOM73r4BR/pub?gid=1200144542&single=true&output=csv';

// Intervalo de recarga del CSV de Google Sheets (milisegundos)
const SHEET_INTERVAL = 30000;  // cada 30 segundos

// ================================================================
// 10 MINERALES — datos de Investing.com como base inicial
// ================================================================
const DB=[
  {id:'gold',sym:'Au',name:'Oro',cat:'precious',color:'#FFD700',ex:'COMEX',rawU:'USD/troy oz',fac:32.1507,raw:4586.41,rawMx:4868.25,rawMn:4505.31,rawV:-309.79,pct:-6.33},
  {id:'silver',sym:'Ag',name:'Plata',cat:'precious',color:'#C0C0C0',ex:'COMEX',rawU:'USD/troy oz',fac:32.1507,raw:69.66,rawMx:76.755,rawMn:65.638,rawV:-7.932,pct:-10.22},
  {id:'plat',sym:'Pt',name:'Platino',cat:'precious',color:'#E5E4E2',ex:'NYMEX',rawU:'USD/troy oz',fac:32.1507,raw:1928.15,rawMx:2050.50,rawMn:1858.70,rawV:-128.45,pct:-6.25},
  {id:'pall',sym:'Pd',name:'Paladio',cat:'precious',color:'#CED0CE',ex:'NYMEX',rawU:'USD/troy oz',fac:32.1507,raw:1448.00,rawMx:1519.00,rawMn:1412.50,rawV:-88.60,pct:-5.77},
  {id:'copper',sym:'Cu',name:'Cobre',cat:'base',color:'#B87333',ex:'COMEX',rawU:'USD/lb',fac:2.20462,raw:5.4558,rawMx:5.5535,rawMn:5.2985,rawV:-0.1382,pct:-2.47},
  {id:'alum',sym:'Al',name:'Aluminio',cat:'base',color:'#A8A9AD',ex:'LME',rawU:'USD/mt',fac:0.001,raw:3251.15,rawMx:3358.50,rawMn:3130.83,rawV:-164.03,pct:-4.80},
  {id:'nickel',sym:'Ni',name:'Níquel',cat:'base',color:'#727472',ex:'LME',rawU:'USD/mt',fac:0.001,raw:16921.00,rawMx:17049.25,rawMn:16350.50,rawV:-233.13,pct:-1.36},
  {id:'zinc',sym:'Zn',name:'Zinc',cat:'base',color:'#7D7D7D',ex:'LME',rawU:'USD/mt',fac:0.001,raw:3080.75,rawMx:3139.05,rawMn:3030.65,rawV:-60.70,pct:-1.93},
  {id:'tin',sym:'Sn',name:'Estaño',cat:'base',color:'#D3D4D5',ex:'LME',rawU:'USD/mt',fac:0.001,raw:46625.00,rawMx:46625.00,rawMn:46625.00,rawV:-1644.00,pct:-3.41},
  {id:'lead',sym:'Pb',name:'Plomo',cat:'base',color:'#5C5C5C',ex:'LME',rawU:'USD/mt',fac:0.001,raw:1887.65,rawMx:1917.75,rawMn:1875.55,rawV:-29.08,pct:-1.52},
];

// ================================================================
// STATE
// ================================================================
let M=[],sel=null,cType='candle',cRange='4h',ticks=0,filter='all',src='sim';
let cD={},lD={},sheetsOK=false,lastSheetData=null;

// ================================================================
// INIT
// ================================================================
async function init(){
  // Build minerals from base data
  M=DB.map(d=>{
    const p=d.raw*d.fac,mx=d.rawMx*d.fac,mn=d.rawMn*d.fac,v=d.rawV*d.fac;
    return{...d,price:p,prev:p,base:p,high:mx,low:mn,open:p-v,chg:v,pct:d.pct,vol:Math.floor(5e3+Math.random()*8e4),volB:5e4};
  });
  sel=M[0];
  M.forEach(m=>{cD[m.id]=genC(m.base,150);lD[m.id]=genL(m.base,300)});

  // Try loading from Google Sheets
  document.getElementById('ltx').textContent='Conectando a Google Sheets...';
  await fetchSheet();

  updClock();updInfo();render();renderSum();renderTbl();updStatus();
  setTimeout(()=>document.getElementById('lo').classList.add('h'),700);

  // Main tick every 1 second
  setInterval(mainTick,1000);
  // Re-fetch Google Sheets periodically
  setInterval(fetchSheet,SHEET_INTERVAL);
}

// ================================================================
// GOOGLE SHEETS CSV FETCH + PARSE
// ================================================================
async function fetchSheet(){
  try{
    const r=await fetch(SHEET_URL+'&_t='+Date.now(),{cache:'no-cache'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const t=await r.text();
    const parsed=parseCSV(t);
    if(parsed&&Object.keys(parsed).length>=3){
      lastSheetData=parsed;
      sheetsOK=true;
      src='sheets';
      // Update base prices from sheet — parsed = {MineralName: usd_kg_value}
      M.forEach(m=>{
        // Try multiple name variations
        const names=[m.name, m.name.normalize('NFD').replace(/[\u0300-\u036f]/g,''), m.sym];
        for(const n of names){
          if(parsed[n]&&parsed[n]>0){
            m.base=parsed[n];
            if(Math.abs(m.price-m.base)/m.base>0.05) m.price=m.base;
            break;
          }
        }
      });
      console.log('✅ Google Sheets:',Object.keys(parsed).length,'minerales',parsed);
    }
  }catch(e){
    console.warn('Sheets fetch:',e);
    if(!sheetsOK) src='sim';
  }
  updStatus();
}

function parseNum(s){
  if(typeof s==='number')return s;if(!s)return NaN;
  s=s.trim().replace(/"/g,'').replace(/[()]/g,'');
  // Remove thousands commas: "147,456.2920" → "147456.2920"
  // Detect: if has both . and , where . comes AFTER last , → English format (comma=thousands)
  if(s.includes(',')&&s.includes('.')){
    const lc=s.lastIndexOf(','),ld=s.lastIndexOf('.');
    if(ld>lc) s=s.replace(/,/g,'');        // English: 147,456.29 → 147456.29
    else s=s.replace(/\./g,'').replace(',','.');  // Spanish: 147.456,29 → 147456.29
  }else if(s.includes(',')){
    // Only commas — could be thousands or decimal
    const parts=s.split(',');
    if(parts.length===2&&parts[1].length<=2) s=s.replace(',','.');  // decimal
    else s=s.replace(/,/g,'');  // thousands
  }
  return parseFloat(s);
}

// Proper CSV parser that handles quoted fields with commas inside
function splitCSVLine(line){
  const result=[];
  let current='';
  let inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){
      inQuotes=!inQuotes;
    }else if(ch===','&&!inQuotes){
      result.push(current.trim());
      current='';
    }else{
      current+=ch;
    }
  }
  result.push(current.trim());
  return result;
}

function parseCSV(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  if(lines.length<4)return null;

  // Find header row (contains "Mineral" and some other keyword)
  let hdrIdx=-1;
  for(let i=0;i<Math.min(lines.length,5);i++){
    const low=lines[i].toLowerCase();
    if(low.includes('mineral')&&(low.includes('usd')||low.includes('mbol')||low.includes('ultimo')||low.includes('ltimo'))){
      hdrIdx=i;break;
    }
  }
  if(hdrIdx===-1) return parseCSV_legacy(text);

  const hdr=splitCSVLine(lines[hdrIdx]).map(h=>h.replace(/"/g,'').trim().toLowerCase());

  // Find key columns
  const colMineral=hdr.findIndex(h=>h.includes('mineral'));
  const colSym=hdr.findIndex(h=>h.includes('mbol')||h.includes('sym'));
  let colUsdKg=hdr.findIndex(h=>h==='usd/kg'||h==='usd_kg');
  if(colUsdKg===-1) colUsdKg=hdr.findIndex(h=>h.includes('usd/kg')||h.includes('usd_kg'));
  if(colUsdKg===-1) colUsdKg=hdr.findIndex(h=>h.includes('usd')&&!h.includes('max')&&!h.includes('min')&&!h.includes('var')&&!h.includes('original'));
  if(colUsdKg===-1) colUsdKg=5;

  const colRaw=hdr.findIndex(h=>h.includes('ltimo')||h.includes('ultimo')||h.includes('raw'));
  const colFactor=hdr.findIndex(h=>h.includes('factor'));

  console.log('CSV parsed — headers:',hdr);
  console.log('Columns: mineral='+colMineral+' sym='+colSym+' usd_kg='+colUsdKg+' raw='+colRaw+' factor='+colFactor);

  const prices={};

  for(let i=hdrIdx+1;i<lines.length;i++){
    const cols=splitCSVLine(lines[i]);
    if(cols.length<3)continue;

    const name=(cols[colMineral>=0?colMineral:0]||'').replace(/"/g,'').trim();
    if(!name||name.toLowerCase().includes('resumen')||name.toLowerCase().includes('total')||name.includes('MINERAL'))continue;

    // Try USD/kg column
    let usdkg=parseNum(cols[colUsdKg]);

    // Fallback: raw × factor
    if((isNaN(usdkg)||usdkg<=0)&&colRaw>=0&&colFactor>=0){
      const raw=parseNum(cols[colRaw]);
      const fac=parseNum(cols[colFactor]);
      if(!isNaN(raw)&&!isNaN(fac)&&raw>0&&fac>0) usdkg=raw*fac;
    }

    if(!isNaN(usdkg)&&usdkg>0){
      prices[name]=usdkg;
      const norm=name.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      if(norm!==name) prices[norm]=usdkg;
      if(colSym>=0){
        const sym=(cols[colSym]||'').replace(/"/g,'').trim();
        if(sym) prices[sym]=usdkg;
      }
      console.log('  ✅ '+name+': '+usdkg.toFixed(4)+' USD/kg');
    }
  }

  console.log('Total parsed:',Object.keys(prices).length,'minerals');
  return Object.keys(prices).length>0?prices:null;
}

// Legacy parser for year-based CSV format (backward compatibility)
function parseCSV_legacy(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  if(lines.length<2)return null;
  const hdr=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
  let best=null,bestYear=0;
  for(let i=lines.length-1;i>=1;i--){
    const cols=lines[i].split(',').map(c=>c.replace(/"/g,'').trim());
    const yr=parseInt(cols[0]);
    if(!isNaN(yr)&&yr>1900&&yr>bestYear){bestYear=yr;best=cols;break}
  }
  if(!best)return null;
  const prices={};
  const nameMap={'oro':'Oro','plata':'Plata','cobre':'Cobre','aluminio':'Aluminio','niquel':'Niquel','zinc':'Zinc','estano':'Estaño','plomo':'Plomo','platino':'Platino','paladio':'Paladio'};
  for(let j=1;j<hdr.length;j++){
    const h=hdr[j].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    for(const[k,v]of Object.entries(nameMap)){if(h.includes(k)){if(j<best.length){const val=parseNum(best[j]);if(!isNaN(val)&&val>0)prices[v]=val;}break}}
  }
  return prices;
}

// ================================================================
// STATUS UI
// ================================================================
function updStatus(){
  const el=document.getElementById('sts'),tx=document.getElementById('stx'),
        bg=document.getElementById('bdg'),ss=document.getElementById('sS');
  el.className='sts M';
  if(src==='sheets'){
    el.classList.add('ok');tx.textContent='GOOGLE SHEETS';
    bg.className='badge ok M';bg.textContent='🟢 Datos Reales (Sheets)';
    ss.textContent='Google Sheets';ss.style.color='var(--grn)';
  }else{
    el.classList.add('sim');tx.textContent='SIMULADO';
    bg.className='badge sim M';bg.textContent='🟡 Simulado (sin Sheets)';
    ss.textContent='Datos Simulados';ss.style.color='var(--gold)';
  }
}

// ================================================================
// DATA GEN + TICK
// ================================================================
function genC(b,n){const c=[];let p=b*(.97+Math.random()*.06),now=Date.now();for(let i=n;i>=0;i--){const t=now-i*6e4,v=b*.003,o=p,cl=o+(Math.random()-.48)*v*2,h=Math.max(o,cl)+Math.random()*v,l=Math.min(o,cl)-Math.random()*v;c.push({t,o,h,l,c:cl});p=cl}return c}
function genL(b,n){const c=[];let p=b*(.97+Math.random()*.06),now=Date.now();for(let i=n;i>=0;i--){p+=(Math.random()-.48)*b*.0012;c.push({t:now-i*15e3,v:p})}return c}
function tick(m){
  const v=m.base*.0006,dr=(Math.random()-.48)*v,rv=(m.base-m.price)*.002;
  m.prev=m.price;m.price=Math.max(m.base*.85,m.price+dr+rv);
  m.chg=m.price-m.open;m.pct=(m.chg/m.open)*100;
  m.high=Math.max(m.high,m.price);m.low=Math.min(m.low,m.price);
  m.vol+=Math.floor(Math.random()*20);
  const cd=cD[m.id],last=cd[cd.length-1];
  if(Date.now()-last.t>6e4){cd.push({t:Date.now(),o:m.price,h:m.price,l:m.price,c:m.price});if(cd.length>250)cd.shift()}
  else{last.c=m.price;last.h=Math.max(last.h,m.price);last.l=Math.min(last.l,m.price)}
  lD[m.id].push({t:Date.now(),v:m.price});if(lD[m.id].length>600)lD[m.id].shift();
}

// ================================================================
// FORMAT
// ================================================================
const fp=v=>v>=1e4?v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):v>=1?v.toFixed(4):v>=.01?v.toFixed(5):v.toFixed(6);
const fc=v=>(v>=0?'+':'')+((Math.abs(v)>=1)?v.toFixed(2):v.toFixed(4));
const fpct=v=>(v>=0?'+':'')+v.toFixed(2)+'%';

// ================================================================
// RENDERS
// ================================================================
function renderSum(){
  document.getElementById('sbar').innerHTML=gf().map(m=>{
    const d=m.pct>=0?'up':'dn',a=m.id===sel.id?'a':'';
    return`<div class="si ${a}" onclick="selM('${m.id}')"><div class="sn M">${m.sym} ${m.name}</div><div class="sp M">${fp(m.price)}</div><div class="sc M ${d}">${fc(m.chg)} (${fpct(m.pct)})</div></div>`;
  }).join('');
}
function renderTbl(){
  const list=gf();document.getElementById('mcnt').textContent=list.length;
  document.getElementById('tb').innerHTML=list.map(m=>{
    const d=m.pct>=0?'up':'dn',a=m.id===sel.id?'a':'',fl=Math.abs(m.price-m.prev)>m.base*.0001?'pf':'';
    return`<tr class="${a}" onclick="selM('${m.id}')"><td><div class="mc"><div class="md" style="background:${m.color}"></div><div><span class="ms">${m.sym}</span><span class="mf">${m.name}</span></div></div></td><td class="${fl}">${fp(m.price)}</td><td class="${d}">${fc(m.chg)}</td><td><span class="cb ${d}">${fpct(m.pct)}</span></td><td style="font-size:8px;color:var(--t3)">${m.ex}</td></tr>`;
  }).join('');
}
function updInfo(){
  if(!sel)return;const m=sel;
  document.getElementById('cic').textContent=m.sym;
  document.getElementById('cic').style.cssText=`background:${m.color}18;color:${m.color};border:1px solid ${m.color}33;width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace`;
  document.getElementById('cnm').textContent=m.name;
  document.getElementById('cun').textContent=`USD/kg — ${m.ex} | ${m.rawU} × ${m.fac}`;
  document.getElementById('cpx').textContent=fp(m.price);
  document.getElementById('cpx').style.color=m.pct>=0?'var(--grn)':'var(--red)';
  const ce=document.getElementById('ccx');ce.textContent=`${fc(m.chg)} (${fpct(m.pct)})`;ce.style.color=m.pct>=0?'var(--grn)':'var(--red)';
  document.getElementById('sH').textContent=fp(m.high);document.getElementById('sL').textContent=fp(m.low);
  const sv=document.getElementById('sV');sv.textContent=fc(m.chg);sv.style.color=m.pct>=0?'var(--grn)':'var(--red)';
  const sp=document.getElementById('sP');sp.textContent=fpct(m.pct);sp.style.color=m.pct>=0?'var(--grn)':'var(--red)';
}

// ================================================================
// CHART
// ================================================================
function render(){
  const cv=document.getElementById('mc'),ct=cv.parentElement,dpr=devicePixelRatio||1,rc=ct.getBoundingClientRect();
  cv.width=rc.width*dpr;cv.height=rc.height*dpr;cv.style.width=rc.width+'px';cv.style.height=rc.height+'px';
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);const W=rc.width,H=rc.height;
  const cs=getComputedStyle(document.body),C={g:cs.getPropertyValue('--grid').trim(),m:cs.getPropertyValue('--t3').trim(),bu:cs.getPropertyValue('--bull').trim(),bb:cs.getPropertyValue('--bullB').trim(),be:cs.getPropertyValue('--bear').trim(),beb:cs.getPropertyValue('--bearB').trim(),bl:cs.getPropertyValue('--blue').trim(),gn:cs.getPropertyValue('--grn').trim(),rd:cs.getPropertyValue('--red').trim(),bg:cs.getPropertyValue('--chart').trim()};
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);if(!sel)return;
  cType==='candle'?drawC(ctx,W,H,sel,C):drawL(ctx,W,H,sel,C);
}
function sN(){return{['1h']:60,['4h']:120,['1d']:180,['1w']:220}[cRange]||120}
function drawC(x,W,H,m,C){
  const d=cD[m.id].slice(-sN());if(d.length<2)return;
  const p={t:16,r:65,b:24,l:8},cw=W-p.l-p.r,ch=H-p.t-p.b;
  let mn=1/0,mx=-1/0;d.forEach(c=>{mn=Math.min(mn,c.l);mx=Math.max(mx,c.h)});
  const rng=mx-mn||1;mn-=rng*.06;mx+=rng*.06;const tot=mx-mn;
  const yS=v=>p.t+ch-((v-mn)/tot)*ch,gap=cw/d.length,bw=Math.max(1,gap*.6);
  x.strokeStyle=C.g;x.lineWidth=.5;for(let i=0;i<=5;i++){const y=p.t+(ch/5)*i;x.beginPath();x.moveTo(p.l,y);x.lineTo(W-p.r,y);x.stroke();x.fillStyle=C.m;x.font='8px JetBrains Mono';x.textAlign='left';x.fillText(fp(mx-(tot/5)*i),W-p.r+4,y+3)}
  d.forEach((c,i)=>{const cx=p.l+i*gap+gap/2,bl=c.c>=c.o,tp=yS(Math.max(c.o,c.c)),bt=yS(Math.min(c.o,c.c)),bH=Math.max(1,bt-tp);x.strokeStyle=bl?C.bu:C.be;x.lineWidth=1;x.beginPath();x.moveTo(cx,yS(c.h));x.lineTo(cx,yS(c.l));x.stroke();x.fillStyle=bl?C.bu:C.be;x.globalAlpha=.85;x.fillRect(cx-bw/2,tp,bw,bH);x.globalAlpha=1;x.strokeStyle=bl?C.bb:C.beb;x.lineWidth=.5;x.strokeRect(cx-bw/2,tp,bw,bH)});
  const lc=d[d.length-1].c,yL=yS(lc);x.setLineDash([3,2]);x.strokeStyle=C.bl+'88';x.lineWidth=1;x.beginPath();x.moveTo(p.l,yL);x.lineTo(W-p.r,yL);x.stroke();x.setLineDash([]);
  x.fillStyle=C.bl;x.fillRect(W-p.r,yL-7,60,14);x.fillStyle='#fff';x.font='bold 8px JetBrains Mono';x.fillText(fp(lc),W-p.r+3,yL+3);
  x.fillStyle=C.m;x.font='7px JetBrains Mono';x.textAlign='center';const st=Math.max(1,Math.floor(d.length/6));for(let i=0;i<d.length;i+=st){const dt=new Date(d[i].t);x.fillText(dt.getHours().toString().padStart(2,'0')+':'+dt.getMinutes().toString().padStart(2,'0'),p.l+i*gap+gap/2,H-6)}
}
function drawL(x,W,H,m,C){
  const cnt={['1h']:80,['4h']:200,['1d']:400,['1w']:500}[cRange]||200,d=lD[m.id].slice(-cnt);if(d.length<2)return;
  const p={t:16,r:65,b:24,l:8},cw=W-p.l-p.r,ch=H-p.t-p.b;
  let mn=1/0,mx=-1/0;d.forEach(pt=>{mn=Math.min(mn,pt.v);mx=Math.max(mx,pt.v)});
  const rng=mx-mn||1;mn-=rng*.06;mx+=rng*.06;const tot=mx-mn;
  const xS=i=>p.l+(i/(d.length-1))*cw,yS=v=>p.t+ch-((v-mn)/tot)*ch;
  x.strokeStyle=C.g;x.lineWidth=.5;for(let i=0;i<=5;i++){const y=p.t+(ch/5)*i;x.beginPath();x.moveTo(p.l,y);x.lineTo(W-p.r,y);x.stroke();x.fillStyle=C.m;x.font='8px JetBrains Mono';x.textAlign='left';x.fillText(fp(mx-(tot/5)*i),W-p.r+4,y+3)}
  const up=d[d.length-1].v>=d[0].v,lc=up?C.gn:C.rd;
  const gr=x.createLinearGradient(0,p.t,0,p.t+ch);gr.addColorStop(0,lc+'22');gr.addColorStop(1,lc+'00');
  x.beginPath();x.moveTo(xS(0),yS(d[0].v));d.forEach((pt,i)=>x.lineTo(xS(i),yS(pt.v)));x.lineTo(xS(d.length-1),p.t+ch);x.lineTo(xS(0),p.t+ch);x.closePath();x.fillStyle=gr;x.fill();
  x.beginPath();x.moveTo(xS(0),yS(d[0].v));d.forEach((pt,i)=>x.lineTo(xS(i),yS(pt.v)));x.strokeStyle=lc+'44';x.lineWidth=4;x.stroke();
  x.beginPath();x.moveTo(xS(0),yS(d[0].v));d.forEach((pt,i)=>x.lineTo(xS(i),yS(pt.v)));x.strokeStyle=lc;x.lineWidth=1.5;x.stroke();
  const lv=d[d.length-1].v,yL=yS(lv);x.setLineDash([3,2]);x.strokeStyle=C.bl+'88';x.lineWidth=1;x.beginPath();x.moveTo(p.l,yL);x.lineTo(W-p.r,yL);x.stroke();x.setLineDash([]);
  x.fillStyle=C.bl;x.fillRect(W-p.r,yL-7,60,14);x.fillStyle='#fff';x.font='bold 8px JetBrains Mono';x.fillText(fp(lv),W-p.r+3,yL+3);
  x.beginPath();x.arc(xS(d.length-1),yL,3,0,Math.PI*2);x.fillStyle=lc;x.fill();
  x.fillStyle=C.m;x.font='7px JetBrains Mono';x.textAlign='center';const st=Math.max(1,Math.floor(d.length/6));for(let i=0;i<d.length;i+=st){const dt=new Date(d[i].t);x.fillText(dt.getHours().toString().padStart(2,'0')+':'+dt.getMinutes().toString().padStart(2,'0'),xS(i),H-6)}
}

// ================================================================
// HELPERS + EVENTS
// ================================================================
function gf(){return filter==='all'?M:M.filter(m=>m.cat===filter)}
window.selM=id=>{sel=M.find(m=>m.id===id);updInfo();render();renderSum();renderTbl()};
function updClock(){const n=new Date();document.getElementById('clk').textContent=n.toLocaleDateString('es-VE',{day:'2-digit',month:'short',year:'numeric'})+' '+n.toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
function mainTick(){M.forEach(tick);ticks++;document.getElementById('cnt').textContent='Ticks: '+ticks.toLocaleString();updClock();updInfo();render();renderSum();renderTbl()}

document.getElementById('thm').onclick=()=>{const b=document.body,c=b.getAttribute('data-theme'),n=c==='dark'?'light':'dark';b.setAttribute('data-theme',n);document.getElementById('ti').textContent=n==='dark'?'🌙':'☀️';document.getElementById('tl').textContent=n==='dark'?'Oscuro':'Claro';setTimeout(render,50);try{localStorage.setItem('mb-t',n)}catch(e){}};
try{if(localStorage.getItem('mb-t')==='light'){document.body.setAttribute('data-theme','light');document.getElementById('ti').textContent='☀️';document.getElementById('tl').textContent='Claro'}}catch(e){}
document.querySelectorAll('.btn[data-f]').forEach(b=>b.onclick=function(){document.querySelectorAll('.btn[data-f]').forEach(x=>x.classList.remove('a'));this.classList.add('a');filter=this.dataset.f;renderSum();renderTbl()});
document.querySelectorAll('.ccb[data-r]').forEach(b=>b.onclick=function(){document.querySelectorAll('.ccb').forEach(x=>x.classList.remove('a'));this.classList.add('a');cRange=this.dataset.r;render()});
document.getElementById('tct').onclick=()=>{cType='candle';render()};
document.getElementById('tln').onclick=()=>{cType='line';render()};
window.onresize=render;
init();
</script>
